name: Notify Feishu on New Report

on:
  push:
    branches:
      - master
      - main
    paths:
      - "*.html"
  workflow_dispatch:
    inputs:
      report_file:
        description: 'HTML filename to test (e.g. game-marketing-report-W08-20260223.html). Leave empty to auto-detect latest.'
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ------------------------------------------------------------------ #
      # 1. Detect which new report HTML was added in this push              #
      # ------------------------------------------------------------------ #
      - name: Detect new report file
        id: detect
        run: |
          # Manual trigger: use provided input or auto-detect latest HTML in repo
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.report_file }}" ]; then
              REPORT_FILE="${{ inputs.report_file }}"
            else
              REPORT_FILE=$(ls -1t *-W[0-9][0-9]-[0-9]*.html 2>/dev/null | head -1 || true)
            fi
          else
            REPORT_FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD \
              | grep -E '^[^/].*-W[0-9]{1,2}-[0-9]{8}\.html$' \
              | head -1 || true)
          fi

          if [ -z "$REPORT_FILE" ]; then
            echo "No new report file in this push. Skipping notification."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false"               >> "$GITHUB_OUTPUT"
          echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"

          WEEK=$(echo "$REPORT_FILE" | grep -oE 'W[0-9]{1,2}')
          DATE_RAW=$(echo "$REPORT_FILE" | grep -oE '[0-9]{8}' | tail -1)
          DATE_DISPLAY="${DATE_RAW:0:4}-${DATE_RAW:4:2}-${DATE_RAW:6:2}"

          echo "week=$WEEK"                  >> "$GITHUB_OUTPUT"
          echo "date_display=$DATE_DISPLAY"  >> "$GITHUB_OUTPUT"
          echo "report_url=https://botanico1110.github.io/marketing-report/${REPORT_FILE}?lang=en" \
                                             >> "$GITHUB_OUTPUT"

          echo "Detected: $REPORT_FILE | $WEEK | $DATE_DISPLAY"

      # ------------------------------------------------------------------ #
      # 2. Extract English summary from the HTML report                     #
      # ------------------------------------------------------------------ #
      - name: Extract report summary
        if: steps.detect.outputs.skip != 'true'
        id: summary
        run: |
          REPORT_FILE="${{ steps.detect.outputs.report_file }}"
          SUMMARY=$(python3 .github/scripts/extract_summary.py "$REPORT_FILE" 2>&1)
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Warning: EN summary extraction failed (exit $EXIT_CODE), will send card without summary."
            SUMMARY=""
          else
            echo "Summary (EN) extracted: ${#SUMMARY} chars"
          fi

          SUMMARY_ZH=$(python3 .github/scripts/extract_summary.py "$REPORT_FILE" --lang zh 2>&1)
          EXIT_CODE_ZH=$?
          if [ $EXIT_CODE_ZH -ne 0 ]; then
            echo "Warning: ZH summary extraction failed (exit $EXIT_CODE_ZH), will send card without zh summary."
            SUMMARY_ZH=""
          else
            echo "Summary (ZH) extracted: ${#SUMMARY_ZH} chars"
          fi

          # Write multiline outputs safely
          {
            echo "text<<__SUMMARY_EOF__"
            echo "$SUMMARY"
            echo "__SUMMARY_EOF__"
            echo "text_zh<<__SUMMARY_ZH_EOF__"
            echo "$SUMMARY_ZH"
            echo "__SUMMARY_ZH_EOF__"
          } >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------ #
      # 3. Send Feishu interactive card                                     #
      # ------------------------------------------------------------------ #
      - name: Send Feishu notification
        if: steps.detect.outputs.skip != 'true'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPORT_FILE:        ${{ steps.detect.outputs.report_file }}
          REPORT_WEEK:        ${{ steps.detect.outputs.week }}
          REPORT_DATE:        ${{ steps.detect.outputs.date_display }}
          REPORT_URL:         ${{ steps.detect.outputs.report_url }}
          REPORT_SUMMARY:     ${{ steps.summary.outputs.text }}
          REPORT_SUMMARY_ZH:  ${{ steps.summary.outputs.text_zh }}
        run: python3 .github/scripts/feishu_notify.py
